name: Ticket ‚Äî Analyze

# Stage 1 of the issue‚Üíticket‚Üícode pipeline. When an issue is labeled `ticket`,
# DeepSeek analyzes it against the repo and posts an implementation plan, then
# moves the issue to `needs-approval`. Reuses the DEEPSEEK_API_KEY repo secret.

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  analyze:
    if: github.event.label.name == 'ticket'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Analyze the ticket
        run: node .github/scripts/ticket-analyze.mjs
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
